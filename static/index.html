<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bryan Smith / Demos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="A small collection of proof-of-concept demos by Bryan Smith, including a JSE momentum factor backtest.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b0d10'/%3E%3Ctext x='50' y='68' font-family='ui-monospace,Menlo,monospace' font-size='58' font-weight='700' fill='%2322d3ee' text-anchor='middle'%3E$%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0b0d10;
    --bg-elevated: #14171a;
    --text: #e6e6e6;
    --muted: #8b949e;
    --accent: #22d3ee;
    --border: #2a2f34;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    padding: 3.5rem 1.5rem;
  }

  .container { max-width: 760px; margin: 0 auto; }

  .prompt { margin: 0; color: var(--accent); font-size: 1rem; }
  h1 { margin: 0.4rem 0 0; font-size: 1.5rem; font-weight: 600; letter-spacing: -0.01em; }
  .tagline { margin: 0.6rem 0 0; color: var(--muted); font-size: 0.95rem; }

  .demos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    margin-top: 2.5rem;
  }

  .card {
    display: block;
    padding: 1.25rem 1.4rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-elevated);
    color: inherit;
    text-decoration: none;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .card:hover, .card:focus-visible {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 24px -8px rgba(34, 211, 238, 0.25);
    outline: none;
  }

  .card-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.75rem;
  }

  .card-name { font-size: 1.05rem; font-weight: 600; }

  .badge {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 999px;
    padding: 0.15rem 0.5rem;
    white-space: nowrap;
  }

  .card-desc { margin: 0.6rem 0 0; color: var(--muted); font-size: 0.85rem; line-height: 1.5; }
  .card-cta { display: inline-block; margin-top: 1rem; color: var(--accent); font-size: 0.8rem; }

  footer { margin-top: 3rem; color: var(--muted); font-size: 0.8rem; }
  footer a { color: var(--muted); text-decoration: underline; }
  footer a:hover, footer a:focus-visible { color: var(--accent); }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <p class="prompt">&gt; bryan smith / demos</p>
      <h1>Demos</h1>
      <p class="tagline">A few small proof-of-concept builds.</p>
    </header>

    <main class="demos">
      <a class="card" href="/demos/momentum-factor/">
        <div class="card-head">
          <span class="card-name">momentum-factor</span>
          <span class="badge">streamlit</span>
        </div>
        <p class="card-desc">JSE 12-1 month momentum factor backtest: a long-only top-quantile portfolio, rebalanced monthly.</p>
        <span class="card-cta">open &rarr;</span>
      </a>
    </main>

    <footer>
      <a href="https://github.com/bryanmehsmith/demo-site">source on github</a>
    </footer>
  </div>
</body>
</html>
